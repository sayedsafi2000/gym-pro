services:
  mongo:
    image: mongo:7
    container_name: gym-mongo
    restart: unless-stopped
    volumes:
      - ./data/db:/data/db

  server:
    image: ghcr.io/${GITHUB_OWNER}/gym-server:${IMAGE_TAG:-latest}
    container_name: gym-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/gymdb
      JWT_SECRET: ${JWT_SECRET}
      # Operator must set these on first deploy to bootstrap the super admin.
      # The server refuses to seed defaults when NODE_ENV=production.
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      GYM_NAME: ${GYM_NAME:-GymPro Fitness}
      GYM_ADDRESS: ${GYM_ADDRESS:-Dhaka, Bangladesh}
      GYM_PHONE: ${GYM_PHONE:-}
      ZKTECO_DEVICE_IP: ${ZKTECO_DEVICE_IP:-}
      ZKTECO_DEVICE_PORT: ${ZKTECO_DEVICE_PORT:-4370}
      ATTENDANCE_POLL_INTERVAL_MS: ${ATTENDANCE_POLL_INTERVAL_MS:-60000}
    depends_on:
      - mongo

  client:
    image: ghcr.io/${GITHUB_OWNER}/gym-admin-panel:${IMAGE_TAG:-latest}
    container_name: gym-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

  backup:
    image: ghcr.io/${GITHUB_OWNER}/gym-backup:${IMAGE_TAG:-latest}
    container_name: gym-backup
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
      BACKUP_MAX_COUNT: ${BACKUP_MAX_COUNT:-7}
      GDRIVE_CLIENT_ID: ${GDRIVE_CLIENT_ID:-}
      GDRIVE_CLIENT_SECRET: ${GDRIVE_CLIENT_SECRET:-}
      GDRIVE_TOKEN: ${GDRIVE_TOKEN:-}
      GDRIVE_FOLDER_ID: ${GDRIVE_FOLDER_ID:-}
    volumes:
      - ./backups:/backups
