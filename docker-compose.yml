services:
  mongo:
    image: mongo:7
    container_name: gym-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./gym-server
    container_name: gym-server
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/gymdb
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongo

  client:
    build:
      context: ./gym-admin-panel
    container_name: gym-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  mongo_data:
