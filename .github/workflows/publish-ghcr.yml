name: Publish Images to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./gym-server
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/gym-server:latest
            ghcr.io/${{ env.OWNER_LC }}/gym-server:${{ github.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./gym-admin-panel
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/gym-admin-panel:latest
            ghcr.io/${{ env.OWNER_LC }}/gym-admin-panel:${{ github.sha }}
