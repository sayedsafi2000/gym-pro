name: Publish Images to GHCR

on:
  push:
    branches:
      - main
      - 'client/*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set image tag from branch
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" = "main" ]; then
            echo "IMAGE_TAG=latest" >> "$GITHUB_ENV"
          else
            # client/abc-gym → client-abc-gym
            TAG=$(echo "$BRANCH" | sed 's|/|-|g')
            echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"
          fi
          echo "Branch: $BRANCH → Tag: $IMAGE_TAG"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./gym-server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/gym-server:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER_LC }}/gym-server:${{ github.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./gym-admin-panel
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/gym-admin-panel:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER_LC }}/gym-admin-panel:${{ github.sha }}

      - name: Build and push backup image
        uses: docker/build-push-action@v6
        with:
          context: ./backup
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/gym-backup:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER_LC }}/gym-backup:${{ github.sha }}
